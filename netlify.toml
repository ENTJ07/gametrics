# Netlify serves the static site from web/. API calls are proxied to the Render
# backend so the browser sees them as same-origin (no CORS needed).
[build]
  publish = "web"

[[redirects]]
  from = "/api/*"
  to = "https://gametrics-api.onrender.com/api/:splat"   # <-- replace with your actual Render URL after deploy
  status = 200
  force = true
